version: "3.9"

services:
  engine:
    build: ./engine
    ports:
      # Loopback only: the GUI reaches the engine over the internal network;
      # the API has no auth unless ENGINE_API_TOKEN is set, so don't expose it.
      - "127.0.0.1:${ENGINE_API_PORT:-8080}:8080"
    env_file: .env
    environment:
      ENGINE_ENV_FILE: /app/data/.env
    volumes:
      - ./certs:/app/certs
      - engine-data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  gui:
    build: ./gui
    ports:
      - "3000:80"
    depends_on:
      - engine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

volumes:
  engine-data:
