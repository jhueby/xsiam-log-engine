<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XSIAM Log Engine</title>
    <script>
      // Apply theme before first paint to avoid a flash of the wrong mode.
      // Mirrors applyTheme() in src/theme.ts (kept inline + dependency-free so
      // it runs before the bundle loads).
      (function () {
        var theme = localStorage.getItem('theme')
          || (matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
        var root = document.documentElement
        if (theme !== 'light') root.classList.add('dark')
        if (theme === 'midnight') root.classList.add('theme-midnight')
        else if (theme === 'nord') root.classList.add('theme-nord')
        else if (theme === 'solarized') root.classList.add('theme-solarized')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
